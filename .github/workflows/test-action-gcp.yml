name: Test GCP
on:
  workflow_dispatch:

jobs:
  test-gcp:
    runs-on: ubuntu-latest
    environment: gcp
    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: https://qa-gcp-newinstall.duplocloud.net/
      DUPLO_TENANT: mounica
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          region: us-central1
          account-id: ${{ secrets.GCP_PROJECT_ID }}
      - run: |
          gcloud version
          gcloud auth list
